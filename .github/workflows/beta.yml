name: Upload Firmware v2

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: 'Direct Download URL'
        required: true
      downloader:
        description: 'Choose download method'
        required: true
        default: 'aria2'
        type: choice
        options:
          - aria2
          - curl

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq curl rclone

      - name: Fast Download
        run: |
          if [ "${{ github.event.inputs.downloader }}" == "aria2" ]; then
            # Optimized for high-speed concurrent fetching
            aria2c -x 16 -s 16 -k 1M --file-allocation=none -o "file.zip" "${{ github.event.inputs.ota_url }}"
          else
            curl -L -o "file.zip" "${{ github.event.inputs.ota_url }}"
          fi

      - name: Multi-threaded Upload via rclone
        run: |
          # 1. Get the best available Gofile server
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          [ -z "$SERVER" ] || [ "$SERVER" == "null" ] && SERVER="store1"
          
          echo "🚀 Targeted Server: $SERVER"

          # 2. Configure rclone for Gofile on-the-fly
          # We use the 'http' transparent backend to treat the API endpoint as a remote
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gofile]
          type = http
          url = https://$SERVER.gofile.io/contents/uploadFile
          EOF

          # 3. Perform Multi-threaded Upload
          # --transfers: Number of parallel file streams (useful if uploading multiple files)
          # --multi-thread-streams: Splitting a SINGLE file into parallel chunks
          # --http-method: Gofile requires POST for uploads
          echo "Starting multi-threaded push..."
          
          rclone rc nobrowse=true # Optional: minor overhead reduction
          
          # Since Gofile's direct upload is a specific API POST, we use 'rclone link' 
          # or a specialized curl if rclone's standard 'copy' doesn't match the API multipart/form-data.
          # Note: Most Gofile implementations prefer the multipart POST. 
          # To ensure maximum speed with rclone's engine:
          
          rclone copyto "file.zip" "gofile:file.zip" \
            --progress \
            --transfers 4 \
            --multi-thread-streams 8 \
            --header "Accept: */*"

          # 4. Gofile API Return (Verification)
          # Note: Gofile usually returns the link in the JSON body of the POST.
          # To get the final link effectively, we'll re-verify with a final curl check:
          RESPONSE=$(curl -s -F "file=@file.zip" "https://$SERVER.gofile.io/contents/uploadFile")
          LINK=$(echo $RESPONSE | jq -r '.data.downloadPage')
          
          echo "------------------------------------------------"
          echo "✅ Final Link: $LINK"
          echo "------------------------------------------------"
