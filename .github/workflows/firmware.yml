name: Upload Firmware to Gofile

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: 'Direct Download URL or Google Drive URL'
        required: true
      downloader:
        description: 'Choose download method (ignored if Google Drive)'
        required: true
        default: 'aria2'
        type: choice
        options:
          - aria2
          - curl

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq curl
          # gdown handles the Google Drive virus scan interstitial pages
          pip install gdown

      - name: Download File
        id: download
        run: |
          URL="${{ github.event.inputs.ota_url }}"
          
          # Check if URL is a Google Drive link
          if [[ "$URL" == *"drive.google.com"* ]]; then
            echo "Google Drive link detected. Using gdown..."
            gdown "$URL" --fuzzy
          elif [ "${{ github.event.inputs.downloader }}" == "aria2" ]; then
            echo "Downloading with aria2..."
            aria2c -x 16 -s 16 "$URL"
          else
            echo "Downloading with curl..."
            curl -L -O -J "$URL"
          fi
          
          # Identify the downloaded file
          FILENAME=$(ls -tp | grep -v / | head -n 1)
          echo "file_name=$FILENAME" >> $GITHUB_OUTPUT
          echo "Detected Filename: $FILENAME"

      - name: Upload to Gofile
        run: |
          FILENAME="${{ steps.download.outputs.file_name }}"
          
          # 1. Get the best available server
          SERVER_RESPONSE=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_RESPONSE | jq -r '.data.servers[0].name')
          
          if [ "$SERVER" == "null" ] || [ -z "$SERVER" ]; then
            echo "❌ Error: Could not retrieve an active Gofile server."
            exit 1
          fi
          
          echo "Uploading $FILENAME to server: $SERVER"
          
          # 2. Upload the file
          UPLOAD_RESPONSE=$(curl -# -F "file=@$FILENAME" "https://$SERVER.gofile.io/contents/uploadFile")
          
          # 3. Parse and display result
          DOWNLOAD_LINK=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage')
          
          if [ "$DOWNLOAD_LINK" != "null" ]; then
            echo "------------------------------------------------"
            echo "✅ Upload Complete!"
            echo "File Name: $FILENAME"
            echo "Download Page: $DOWNLOAD_LINK"
            echo "------------------------------------------------"
          else
            echo "❌ Upload failed. Response: $UPLOAD_RESPONSE"
            exit 1
          fi
