name: Extract OTA Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: 'Direct Download URL for the OTA zip'
        required: true
      downloader:
        description: 'Choose download method'
        required: true
        default: 'aria2'
        type: choice
        options:
          - aria2
          - curl

jobs:
  extract-and-upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Added zip to dependencies
          sudo apt-get install -y python3-pip unzip jq aria2 zip
          pip3 install payload-dumper

      - name: Process Firmware
        run: |
          mkdir -p workspace/extracted_images
          cd workspace
          
          if [ "${{ github.event.inputs.downloader }}" == "aria2" ]; then
            echo "Downloading with aria2..."
            aria2c -x 16 -s 16 -o ota_package.zip "${{ github.event.inputs.ota_url }}"
          else
            echo "Downloading with curl..."
            curl -L -o ota_package.zip "${{ github.event.inputs.ota_url }}"
          fi
          
          echo "Unzipping..."
          unzip -o ota_package.zip
          
          PAYLOAD_PATH=$(find . -name "payload.bin" | head -n 1)
          
          if [ -f "$PAYLOAD_PATH" ]; then
            echo "Dumping images..."
            payload_dumper --out ./extracted_images --partitions boot,init_boot "$PAYLOAD_PATH"
          else
            echo "Error: payload.bin not found."
            exit 1
          fi

      - name: Zip and Upload
        run: |
          # 1. Zip the images into one package
          # -j flag keeps the zip structure flat (no directory inside the zip)
          zip -j output_package.zip workspace/extracted_images/*.img
          
          # 2. Get available server
          SERVER_RESPONSE=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_RESPONSE | jq -r '.data.servers[0].name')
          
          echo "Uploading package to: $SERVER"
          
          # 3. Upload the single zip file
          UPLOAD_RESPONSE=$(curl -s -F file=@output_package.zip "https://$SERVER.gofile.io/contents/uploadFile")
          
          # 4. Extract and print the link
          DOWNLOAD_LINK=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage')
          
          echo "✅ Success: output_package.zip uploaded."
          echo "Link: $DOWNLOAD_LINK"
