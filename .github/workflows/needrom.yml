name: Extract Zip Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: 'Direct Download URL for the Firmware zip'
        required: true
      downloader:
        description: 'Choose download method'
        required: true
        default: 'aria2'
        type: choice
        options:
          - aria2
          - curl

jobs:
  extract-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Removed python3-pip and payload-dumper as they are no longer needed
          sudo apt-get install -y unzip jq aria2 zip

      - name: Process Firmware
        run: |
          mkdir -p workspace/extracted_images
          cd workspace
          
          # Download
          if [ "${{ github.event.inputs.downloader }}" == "aria2" ]; then
            echo "Downloading with aria2..."
            aria2c -x 16 -s 16 -o ota_package.zip "${{ github.event.inputs.ota_url }}"
          else
            echo "Downloading with curl..."
            curl -L -o ota_package.zip "${{ github.event.inputs.ota_url }}"
          fi
          
          echo "Unzipping..."
          unzip -o ota_package.zip
          
          echo "Searching for images..."
          # Find and copy the specific files to our extraction folder
          # This handles files even if they are in subdirectories
          find . -type f \( -name "boot.img" -o -name "init_boot.img" -o -name "vbmeta.img" \) -exec cp {} extracted_images/ \;
          
          # Check if we actually found files
          if [ -z "$(ls -A extracted_images)" ]; then
            echo "Error: Required images (boot, init_boot, vbmeta) not found in the OTA zip."
            exit 1
          fi

      - name: Zip and Upload
        run: |
          # Zip the images from the folder
          zip -j output_package.zip workspace/extracted_images/*.img
          
          # Get available server
          SERVER_RESPONSE=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_RESPONSE | jq -r '.data.servers[0].name')
          
          echo "Uploading package to: $SERVER"
          
          # Upload the single zip file
          UPLOAD_RESPONSE=$(curl -s -F file=@output_package.zip "https://$SERVER.gofile.io/contents/uploadFile")
          
          # Extract and print the link
          DOWNLOAD_LINK=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage')
          
          echo "✅ Success: output_package.zip uploaded."
          echo "Link: $DOWNLOAD_LINK"
